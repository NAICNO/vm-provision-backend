apiVersion: apps/v1
kind: Deployment
metadata:
  name: redis
spec:
  replicas: 1
  selector:
    matchLabels:
      app: redis
  template:
    metadata:
      labels:
        app: redis
    spec:
      containers:
        - name: redis
          image: redis:7.4-alpine
          ports:
            - containerPort: 6379
          volumeMounts:
            - name: redis-data
              mountPath: /data
          command: [
            "redis-server",
            "--requirepass", "$(REDIS_PASSWORD)",
            "--appendonly", "yes",
            "--tcp-keepalive", "60",
            "--timeout", "300",
            "--tcp-backlog", "511",
            "--maxclients", "10000"
          ]
          env:
            - name: REDIS_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: redis-secret
                  key: redis-password
          livenessProbe:
            exec:
              command:
                - sh
                - -c
                - redis-cli -a $REDIS_PASSWORD ping | grep PONG
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            exec:
              command:
                - sh
                - -c
                - redis-cli -a $REDIS_PASSWORD ping | grep PONG
            initialDelaySeconds: 5
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 3
            successThreshold: 1
          resources:
            requests:
              memory: "768Mi"  # Increased for better performance
              cpu: "500m"
            limits:
              memory: "1.5Gi"  # More headroom for peak loads
              cpu: "1"
          # Add startup probe to prevent premature readiness during recovery
          startupProbe:
            exec:
              command:
                - sh
                - -c
                - redis-cli -a $REDIS_PASSWORD ping | grep PONG
            initialDelaySeconds: 0
            periodSeconds: 2
            timeoutSeconds: 3
            failureThreshold: 30  # 60 seconds total startup time allowed
      volumes:
        - name: redis-data
          persistentVolumeClaim:
            claimName: redis-pvc
