#cloud-config

write_files:
  - path: /etc/profile.d/eessi_init.sh
    content: |
      #!/bin/bash

      # Script to source EESSI environment upon user login

      # Allow for a silent mode
      if [[ -v EESSI_SILENT ]]; then
        # EESSI_SILENT set
        output=/dev/null
      else
        output=/dev/stdout
      fi

      # The following method should be safe, but might break if file is a symlink
      # (could switch to $(dirname "$(readlink -f "$BASH_SOURCE")") in that case)
      source /cvmfs/pilot.eessi-hpc.org/latest/init/eessi_environment_variables

      # only continue if setting EESSI environment variables worked fine
      if [ $? -eq 0 ]; then

        # export PS1="[NAIC EESSI pilot $EESSI_PILOT_VERSION] $ "

        # add location of commands provided by compat layer to $PATH;
        # see https://github.com/EESSI/software-layer/issues/52
        export PATH=$EPREFIX/usr/bin:$EPREFIX/bin:$PATH

        # init Lmod
        echo "Initializing Lmod..." >> $output
        source $EESSI_EPREFIX/usr/share/Lmod/init/bash

        # prepend location of modules for EESSI software stack to $MODULEPATH
        echo "Prepending $EESSI_MODULEPATH to \$MODULEPATH..." >> $output
        module use $EESSI_MODULEPATH

        echo "Environment set up to use EESSI pilot software stack." >> $output
        echo "Thank you for using NAIC - Self Service VM Portal!" >> $output
      fi

    permissions: '0755'

#cloud-config

runcmd:
  - |
    if [ -f /etc/redhat-release ]; then
      curl -s https://raw.githubusercontent.com/NAICNO/vm-provision-scripts/master/cloud-init/rhel.sh| bash
    fi
  - |
    if [ -f /etc/debian_version ]; then
      curl -s https://raw.githubusercontent.com/NAICNO/vm-provision-scripts/master/cloud-init/debian.sh | bash
    fi
    



